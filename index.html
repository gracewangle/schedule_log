<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>지원사업 보드 v5</title>
  <style>
    :root{
      --bg:#f5f7fb;--card:#fff;--text:#172033;--muted:#6b7280;--line:#e5e7eb;
      --primary:#2563eb;--primary-dark:#1d4ed8;--green:#16a34a;--yellow:#f59e0b;--red:#dc2626;
      --blue-light:#eff6ff;--green-light:#ecfdf5;--yellow-light:#fffbeb;--red-light:#fef2f2;
      --shadow:0 10px 25px rgba(15,23,42,.07);--radius:18px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text)}
    button,input,select,textarea{font-family:inherit}
    .topbar{position:sticky;top:0;z-index:20;background:rgba(245,247,251,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .topbar-inner{max-width:1180px;margin:0 auto;padding:14px 16px;display:flex;justify-content:space-between;gap:12px;align-items:center}
    .brand{display:flex;gap:10px;align-items:center;min-width:0}
    .logo{width:38px;height:38px;border-radius:13px;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;display:grid;place-items:center;font-weight:950;box-shadow:var(--shadow)}
    .brand h1{font-size:20px;margin:0;letter-spacing:-.03em}
    .brand p{margin:2px 0 0;font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .app{max-width:1180px;margin:0 auto;padding:18px 16px 90px}
    .layout{display:grid;grid-template-columns:290px 1fr;gap:18px;align-items:start}
    .sidebar{position:sticky;top:82px;display:flex;flex-direction:column;gap:12px}
    .main{display:flex;flex-direction:column;gap:18px;min-width:0}
    .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
    .panel{padding:16px}
    .section-title{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:12px}
    .section-title h2,.section-title h3{margin:0;font-size:18px}
    .section-title p{margin:4px 0 0;color:var(--muted);font-size:13px}
    .btn{border:0;background:var(--primary);color:#fff;padding:11px 14px;border-radius:13px;font-weight:900;cursor:pointer;font-size:14px;min-height:42px;display:inline-flex;gap:6px;align-items:center;justify-content:center}
    .btn:hover{background:var(--primary-dark)}
    .btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}
    .btn.ghost{background:transparent;color:var(--muted);border:1px solid var(--line)}
    .btn.danger{background:var(--red)}
    .btn.small{min-height:34px;padding:8px 10px;font-size:12px;border-radius:10px}
    .project-list,.list{display:flex;flex-direction:column;gap:10px}
    .project-item{padding:13px;border:1px solid var(--line);border-radius:15px;background:#fff;cursor:pointer;transition:.15s}
    .project-item.active{border-color:var(--primary);background:var(--blue-light)}
    .project-item strong{display:block;font-size:14px;line-height:1.35;margin-bottom:7px}
    .meta{display:flex;flex-wrap:wrap;gap:6px;color:var(--muted);font-size:12px}
    .pill{display:inline-flex;align-items:center;gap:4px;padding:5px 8px;border-radius:999px;font-size:12px;font-weight:900;background:#f3f4f6;color:#374151;white-space:nowrap}
    .pill.blue{background:var(--blue-light);color:#1d4ed8}.pill.green{background:var(--green-light);color:#15803d}.pill.yellow{background:var(--yellow-light);color:#b45309}.pill.red{background:var(--red-light);color:#b91c1c}
    .hero{padding:20px;background:radial-gradient(circle at top right,rgba(37,99,235,.18),transparent 35%),linear-gradient(135deg,#fff,#f8fbff)}
    .hero-head{display:flex;justify-content:space-between;gap:14px;margin-bottom:16px}
    .hero h2{font-size:25px;margin:0;line-height:1.2;letter-spacing:-.04em}
    .hero p{margin:8px 0 0;color:var(--muted);font-size:14px}
    .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .grid-2{display:grid;grid-template-columns:1.15fr .85fr;gap:18px}
    .grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .stat{border:1px solid var(--line);border-radius:16px;padding:15px;background:rgba(255,255,255,.78)}
    .stat .label{color:var(--muted);font-size:13px;font-weight:800}
    .stat .value{font-size:24px;font-weight:950;margin-top:7px;letter-spacing:-.04em}
    .stat .sub{color:var(--muted);font-size:12px;margin-top:4px}
    .progress{height:9px;background:#e5e7eb;border-radius:999px;overflow:hidden;margin-top:10px}
    .progress span{display:block;height:100%;background:var(--primary)}
    .progress.green span{background:var(--green)}.progress.yellow span{background:var(--yellow)}.progress.red span{background:var(--red)}
    .tabs{display:flex;gap:8px;overflow:auto;padding:4px;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--shadow)}
    .tab{flex:1;min-width:max-content;border:0;background:transparent;color:var(--muted);font-weight:950;padding:11px 14px;border-radius:12px;cursor:pointer}
    .tab.active{background:var(--primary);color:#fff}
    .view{display:none}.view.active{display:block}
    .row-card{border:1px solid var(--line);border-radius:15px;padding:13px;background:#fff;display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .row-card.done{opacity:.68}
    .row-card.done h4{text-decoration:line-through;text-decoration-thickness:2px;color:var(--muted)}
    .row-card h4{margin:0;font-size:15px;line-height:1.35}
    .row-card p{margin:6px 0 0;color:var(--muted);font-size:13px;line-height:1.45}
    .row-actions{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end;flex:none}

    .order-badge{width:34px;height:34px;border-radius:12px;background:#f1f5f9;color:#334155;display:grid;place-items:center;font-size:13px;font-weight:950;flex:none}
    .task-left{display:flex;gap:10px;align-items:flex-start;min-width:0}
    .task-content{min-width:0}
    .amount{font-weight:950;white-space:nowrap}.income{color:var(--green)}.outcome{color:var(--red)}
    .empty{text-align:center;padding:28px 18px;color:var(--muted);border:1px dashed #cbd5e1;border-radius:16px;background:#f8fafc}
    .alert-list{display:flex;flex-direction:column;gap:9px}
    .alert{padding:12px;border-radius:14px;font-size:13px;font-weight:850;border:1px solid transparent;display:flex;gap:8px;line-height:1.45}
    .alert.red{background:var(--red-light);color:#991b1b;border-color:#fecaca}.alert.yellow{background:var(--yellow-light);color:#92400e;border-color:#fde68a}.alert.blue{background:var(--blue-light);color:#1e40af;border-color:#bfdbfe}
    .kpi-group{border:1px solid var(--line);border-radius:18px;background:#fff;overflow:hidden}
    .kpi-group-head{padding:15px;background:#f8fafc;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .kpi-group-head h3{margin:0;font-size:16px}
    .kpi-group-head p{margin:6px 0 0;color:var(--muted);font-size:13px}
    .kpi-group-body{padding:12px;display:flex;flex-direction:column;gap:10px}
    .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
    .field{display:flex;flex-direction:column;gap:6px}
    .field.full{grid-column:1/-1}
    label{font-size:13px;font-weight:950;color:#374151}
    input,select,textarea{width:100%;border:1px solid var(--line);background:#fff;padding:12px;min-height:45px;border-radius:12px;font-size:14px;outline:none}
    textarea{min-height:88px;resize:vertical}
    input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{border-bottom:1px solid var(--line);padding:11px 8px;text-align:left;vertical-align:top}
    th{color:var(--muted);font-size:12px;background:#f9fafb}
    .modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.46);z-index:80;display:none;align-items:flex-end;justify-content:center;padding:18px}
    .modal-backdrop.show{display:flex}
    .modal{width:min(760px,100%);max-height:90vh;overflow:auto;background:#fff;border-radius:22px;box-shadow:0 20px 60px rgba(15,23,42,.25);padding:18px}
    .modal-head{display:flex;justify-content:space-between;gap:12px;margin-bottom:14px}
    .modal-head h3{margin:0;font-size:20px}
    .modal-head p{margin:5px 0 0;color:var(--muted);font-size:13px}
    .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;flex-wrap:wrap}
    .bottom-nav{display:none;position:fixed;left:0;right:0;bottom:0;z-index:50;background:rgba(255,255,255,.94);backdrop-filter:blur(12px);border-top:1px solid var(--line);padding:8px 10px;grid-template-columns:repeat(5,1fr);gap:5px}
    .bottom-nav button{border:0;background:transparent;padding:8px 4px;border-radius:12px;font-size:11px;font-weight:950;color:var(--muted);display:flex;flex-direction:column;gap:3px;align-items:center}
    .bottom-nav button.active{background:var(--blue-light);color:var(--primary)}
    .quick-add{display:flex;flex-wrap:wrap;gap:8px}.helper{font-size:12px;color:var(--muted);line-height:1.45}
    @media(max-width:900px){.layout{grid-template-columns:1fr}.sidebar{position:static}.stat-grid,.grid-3{grid-template-columns:repeat(2,1fr)}.grid-2{grid-template-columns:1fr}.top-actions .btn.secondary{display:none}}
    @media(max-width:640px){.app{padding:14px 12px 92px}.topbar-inner{padding:14px 12px}.brand h1{font-size:17px}.brand p{max-width:190px}.hero{padding:16px}.hero-head{flex-direction:column}.hero h2{font-size:21px}.stat-grid{grid-template-columns:repeat(2,1fr)}.tabs{display:none}.bottom-nav{display:grid}.row-card{flex-direction:column}.row-actions{justify-content:flex-start}.form-grid{grid-template-columns:1fr}.modal-backdrop{padding:10px}.modal{border-radius:18px;padding:15px}table{display:block;overflow-x:auto;white-space:nowrap}.btn{padding:10px 11px;font-size:13px}.kpi-group-head{flex-direction:column}}
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <div class="logo">보</div>
        <div>
          <h1>지원사업 보드 v5</h1>
          <p>KPI 안에서 할 일 순서 직접 변경</p>
        </div>
      </div>
      <div class="top-actions">
        <button class="btn secondary" onclick="exportData()">백업</button>
        <button class="btn" onclick="openModal('project')">+ 프로젝트</button>
      </div>
    </div>
  </header>

  <main class="app">
    <div class="layout">
      <aside class="sidebar">
        <section class="card panel">
          <div class="section-title">
            <div>
              <h3>프로젝트</h3>
              <p>지원사업별 분리 관리</p>
            </div>
          </div>
          <div id="projectList" class="project-list"></div>
        </section>

        <section class="card panel">
          <div class="section-title">
            <div>
              <h3>빠른 등록</h3>
              <p>KPI를 만들고 그 안에 할 일을 추가</p>
            </div>
          </div>
          <div class="quick-add">
            <button class="btn small" onclick="openModal('kpi')">KPI</button>
            <button class="btn small" onclick="openModal('task')">할 일</button>
            <button class="btn small" onclick="openModal('transaction')">입출금</button>
            <button class="btn small" onclick="openModal('budget')">예산</button>
          </div>
        </section>
      </aside>

      <section class="main">
        <section id="hero" class="card hero"></section>

        <nav class="tabs">
          <button class="tab active" data-view="dashboard" onclick="setView('dashboard')">대시보드</button>
          <button class="tab" data-view="tasks" onclick="setView('tasks')">KPI별 할 일</button>
          <button class="tab" data-view="money" onclick="setView('money')">입출금/예산</button>
          <button class="tab" data-view="kpi" onclick="setView('kpi')">KPI</button>
          <button class="tab" data-view="deliverables" onclick="setView('deliverables')">증빙/산출물</button>
        </nav>

        <section id="dashboard" class="view active"></section>
        <section id="tasks" class="view"></section>
        <section id="money" class="view"></section>
        <section id="kpi" class="view"></section>
        <section id="deliverables" class="view"></section>
      </section>
    </div>
  </main>

  <nav class="bottom-nav">
    <button class="active" data-view="dashboard" onclick="setView('dashboard')">🏠<span>홈</span></button>
    <button data-view="tasks" onclick="setView('tasks')">✅<span>할 일</span></button>
    <button data-view="money" onclick="setView('money')">💰<span>입출금</span></button>
    <button data-view="kpi" onclick="setView('kpi')">📊<span>KPI</span></button>
    <button data-view="deliverables" onclick="setView('deliverables')">📁<span>증빙</span></button>
  </nav>

  <div id="modalBackdrop" class="modal-backdrop" onclick="closeModal(event)">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-head">
        <div>
          <h3 id="modalTitle">등록</h3>
          <p id="modalDesc">정보를 입력하세요.</p>
        </div>
        <button class="btn ghost small" onclick="hideModal()">닫기</button>
      </div>
      <form id="modalForm"></form>
    </div>
  </div>

<script>
const STORAGE_KEY = "grant_board_mvp_v5";
const oldKeys = ["grant_board_mvp_v4", "grant_board_mvp_v3", "grant_board_mvp_v2", "grant_board_mvp_v1"];
const weekdays = ["일","월","화","수","목","금","토"];

const defaultData = {
  selectedProjectId:"p1",
  projects:[
    {id:"p1",name:"2026 강화군 청년 로컬크리에이터",organization:"강화군",startDate:"2026-07-01",endDate:"2026-10-31",totalBudget:10000000,status:"active",memo:"오프데이랩 체류형 회복 프로그램 운영"},
    {id:"p2",name:"띵동착 공동구매 베타 운영",organization:"로컬비",startDate:"2026-07-01",endDate:"2026-08-31",totalBudget:3000000,status:"active",memo:"난각번호 1번 유정란 공동구매 테스트"}
  ],
  kpis:[
    {id:"k1",projectId:"p1",title:"참여자 모집",targetValue:30,currentValue:12,unit:"명"},
    {id:"k2",projectId:"p1",title:"프로그램 운영",targetValue:5,currentValue:2,unit:"회"},
    {id:"k3",projectId:"p1",title:"콘텐츠 발행",targetValue:10,currentValue:4,unit:"건"},
    {id:"k4",projectId:"p2",title:"공동구매 주문",targetValue:50,currentValue:8,unit:"건"}
  ],
  tasks:[
    {id:"t1",projectId:"p1",kpiId:"k1",order:1,title:"홍보물 제작 및 배포",category:"홍보",dueDate:"2026-07-15",status:"progress",priority:"high",memo:"참여자 모집 KPI 달성을 위한 홍보물 제작"},
    {id:"t2",projectId:"p1",kpiId:"k1",order:2,title:"참여자 모집글 업로드",category:"모집",dueDate:"2026-07-12",status:"todo",priority:"high",memo:"인스타그램, 지역 커뮤니티 업로드"},
    {id:"t3",projectId:"p1",kpiId:"k2",order:1,title:"프로그램 운영 장소 확정",category:"운영",dueDate:"2026-07-20",status:"todo",priority:"high",memo:"프로그램 운영 KPI와 연결"},
    {id:"t4",projectId:"p1",kpiId:"k3",order:1,title:"1차 프로그램 콘텐츠 촬영",category:"콘텐츠",dueDate:"2026-07-25",status:"todo",priority:"medium",memo:"SNS 콘텐츠 발행용"},
    {id:"t5",projectId:"p2",kpiId:"k4",order:1,title:"QR 결제 안내 화면 수정",category:"개발",dueDate:"2026-07-08",status:"progress",priority:"high",memo:"서울페이 QR 안내 반영"}
  ],
  budgets:[
    {id:"b1",projectId:"p1",name:"홍보비",allocatedAmount:2000000},
    {id:"b2",projectId:"p1",name:"운영비",allocatedAmount:3000000},
    {id:"b3",projectId:"p1",name:"인건비",allocatedAmount:4000000},
    {id:"b4",projectId:"p1",name:"예비비",allocatedAmount:1000000},
    {id:"b5",projectId:"p2",name:"상품 샘플비",allocatedAmount:1000000},
    {id:"b6",projectId:"p2",name:"홍보비",allocatedAmount:1000000},
    {id:"b7",projectId:"p2",name:"운영비",allocatedAmount:1000000}
  ],
  transactions:[
    {id:"m1",projectId:"p1",type:"income",incomeType:"grant",budgetCategoryId:"",date:"2026-07-01",title:"지원금 1차 입금",amount:7000000,vendor:"강화군",method:"통장입금",hasReceipt:true,memo:"1차 교부금"},
    {id:"m2",projectId:"p1",type:"income",incomeType:"interest",budgetCategoryId:"",date:"2026-07-03",title:"통장 이자",amount:1300,vendor:"은행",method:"이자",hasReceipt:true,memo:"이자수입"},
    {id:"m3",projectId:"p1",type:"expense",incomeType:"",budgetCategoryId:"b1",date:"2026-07-06",title:"전단지 인쇄",amount:300000,vendor:"OO인쇄소",method:"계좌이체",hasReceipt:true,memo:"A5 전단지 2,000장"},
    {id:"m4",projectId:"p1",type:"expense",incomeType:"",budgetCategoryId:"b2",date:"2026-07-05",title:"회의 다과비",amount:45000,vendor:"동네카페",method:"카드",hasReceipt:false,memo:"협력자 회의"},
    {id:"m5",projectId:"p2",type:"income",incomeType:"self",budgetCategoryId:"",date:"2026-07-01",title:"운영비 입금",amount:1000000,vendor:"로컬비",method:"자부담",hasReceipt:true,memo:"베타 운영비"},
    {id:"m6",projectId:"p2",type:"expense",incomeType:"",budgetCategoryId:"b5",date:"2026-07-04",title:"유정란 샘플 구매",amount:120000,vendor:"로컬 농가",method:"계좌이체",hasReceipt:true,memo:"큐레이터 테스트용"}
  ],
  deliverables:[
    {id:"d1",projectId:"p1",title:"지출 영수증 정리",dueDate:"2026-08-01",status:"progress",memo:"홍보비, 운영비 증빙 정리"},
    {id:"d2",projectId:"p1",title:"프로그램 운영 사진",dueDate:"2026-08-20",status:"todo",memo:"현장 사진, 참여자 활동 사진"},
    {id:"d3",projectId:"p1",title:"중간보고서",dueDate:"2026-08-15",status:"todo",memo:"사업 추진 현황 포함"},
    {id:"d4",projectId:"p2",title:"주문자 명단 정리",dueDate:"2026-07-20",status:"todo",memo:"카톡방 주문 내역 기준"}
  ]
};

let data = loadData();
let currentView = "dashboard";

function loadData(){
  const saved = localStorage.getItem(STORAGE_KEY);
  if(saved){ try { return normalize(JSON.parse(saved)); } catch(e){} }
  for(const key of oldKeys){
    const old = localStorage.getItem(key);
    if(old){ try { return migrate(JSON.parse(old)); } catch(e){} }
  }
  return structuredClone(defaultData);
}

function migrate(d){
  if(d.expenses && !d.transactions){
    d.transactions = d.expenses.map(e => ({...e,type:"expense",incomeType:"",method:e.method||""}));
    delete d.expenses;
  }
  return normalize({...structuredClone(defaultData),...d});
}

function normalize(d){
  ["projects","tasks","budgets","transactions","kpis","deliverables"].forEach(k => d[k] ||= []);
  d.tasks.forEach((t,i) => {
    if(!t.order) t.order = i + 1;
    if(!("kpiId" in t)) t.kpiId = "";
    delete t.phase;
  });
  if(!d.selectedProjectId && d.projects[0]) d.selectedProjectId = d.projects[0].id;
  return d;
}

function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
function uid(p){ return p+"_"+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function won(n){ return Number(n||0).toLocaleString("ko-KR")+"원"; }
function pct(n){ return !isFinite(n) ? 0 : Math.max(0, Math.min(999, Math.round(n))); }
function todayString(){ return new Date().toISOString().slice(0,10); }
function weekday(date){ return weekdays[new Date(date+"T00:00:00").getDay()]; }
function dateWithDay(date){ return `${date} (${weekday(date)})`; }
function daysBetween(a,b){ return Math.ceil((new Date(b+"T00:00:00")-new Date(a+"T00:00:00"))/86400000); }
function selectedProject(){ return data.projects.find(p=>p.id===data.selectedProjectId)||data.projects[0]; }
function projectItems(arr){ const p=selectedProject(); return p ? arr.filter(x=>x.projectId===p.id) : []; }

function calcProject(p){
  const tasks = data.tasks.filter(t=>t.projectId===p.id).sort((a,b)=>(a.order||0)-(b.order||0));
  const tx = data.transactions.filter(t=>t.projectId===p.id);
  const expenses = tx.filter(t=>t.type==="expense");
  const incomes = tx.filter(t=>t.type==="income");
  const kpis = data.kpis.filter(k=>k.projectId===p.id);
  const deliverables = data.deliverables.filter(d=>d.projectId===p.id);
  const totalExpense = expenses.reduce((s,e)=>s+Number(e.amount||0),0);
  const totalIncome = incomes.reduce((s,e)=>s+Number(e.amount||0),0);
  const doneTasks = tasks.filter(t=>t.status==="done").length;
  const progressRate = tasks.length ? pct(doneTasks/tasks.length*100) : 0;
  const budgetRate = p.totalBudget ? pct(totalExpense/Number(p.totalBudget)*100) : 0;
  const kpiRate = kpis.length ? pct(kpis.reduce((s,k)=>s+Math.min(100,Number(k.currentValue||0)/Number(k.targetValue||1)*100),0)/kpis.length) : 0;
  return {
    tasks, transactions:tx, expenses, incomes, kpis, deliverables,
    totalExpense,totalIncome,bankBalance:totalIncome-totalExpense,
    doneTasks,progressRate,budgetRate,kpiRate,
    missingReceipts:tx.filter(t=>!t.hasReceipt).length,
    dDay:daysBetween(todayString(),p.endDate)
  };
}

  return `<div class="stat"><div class="label">${label}</div><div class="value">${value}</div><div class="sub">${sub}</div><div class="progress ${color||""}"><span style="width:${Math.min(100,Number(rate||0))}%"></span></div></div>`;
}

function buildAlerts(p){
  const c=calcProject(p), alerts=[];
  c.tasks.filter(t=>t.status!=="done").forEach(t=>{
    const d=daysBetween(todayString(),t.dueDate);
    if(d<=3) alerts.push(["red",`할 일 마감 임박: ${t.title} ${d>=0?'D-'+d:'기한 초과'}`]);
    else if(d<=7) alerts.push(["yellow",`이번 주 마감: ${t.title} D-${d}`]);
  });
  c.kpis.forEach(k=>{
    const related=c.tasks.filter(t=>t.kpiId===k.id);
    if(!related.length) alerts.push(["yellow",`KPI "${k.title}"에 연결된 할 일이 없습니다.`]);
  });
  c.tasks.filter(t=>!t.kpiId).forEach(t=>{
    alerts.push(["yellow",`"${t.title}" 할 일이 KPI에 연결되지 않았습니다.`]);
  });
  if(c.bankBalance<0) alerts.push(["red","통장 잔액이 마이너스입니다. 입금/출금 기록을 확인하세요."]);
  if(c.budgetRate>=90) alerts.push(["red",`예산 사용률이 ${c.budgetRate}%입니다.`]);
  if(c.missingReceipts>0) alerts.push(["yellow",`증빙 미확인 입출금이 ${c.missingReceipts}건 있습니다.`]);
  if(!alerts.length) alerts.push(["blue","현재 긴급 위험 알림은 없습니다."]);
  return alerts.slice(0,8);
}

  const tasks=projectItems(data.tasks).filter(t=>t.kpiId===k.id);
  const done=tasks.filter(t=>t.status==="done").length;
  const rate=tasks.length?pct(done/tasks.length*100):0;
  return `<div class="row-card">
    <div style="width:100%">
      <h4>${esc(k.title)}</h4>
      <p>연결 할 일 ${done}/${tasks.length}개 완료</p>

    </div>

function renderTasks(){
  const kpis=projectItems(data.kpis), tasks=projectItems(data.tasks);
  const unassigned=tasks.filter(t=>!t.kpiId).sort((a,b)=>(a.order||0)-(b.order||0));
  let html=`<section class="card panel">
    <div class="section-title">
      <div>
        <h3>KPI별 할 일 관리</h3>
        <p>KPI 안에 할 일을 바로 넣고, 같은 KPI 안에서 순서를 바꿉니다.</p>
      </div>
      <button class="btn small" onclick="openModal('task')">+ 할 일</button>
    </div>
    <div class="list">`;
  html += kpis.map(k=>kpiTaskGroup(k)).join("");
  if(unassigned.length){
    html += `<div class="kpi-group">
      <div class="kpi-group-head">
        <div><h3>연결 안 된 할 일</h3><p>KPI 선택이 필요한 할 일입니다.</p></div>
      </div>
      <div class="kpi-group-body">${unassigned.map(taskRow).join("")}</div>

  document.getElementById("tasks").innerHTML=html;
}

function kpiTaskGroup(k){
  const all=projectItems(data.tasks).filter(t=>t.kpiId===k.id).sort((a,b)=>(a.order||0)-(b.order||0));
  const done=all.filter(t=>t.status==="done").length;
  const rate=all.length?pct(done/all.length*100):0;
  return `<div class="kpi-group">
    <div class="kpi-group-head">
      <div>
        <h3>${esc(k.title)}</h3>
        <p>목표 ${Number(k.targetValue||0).toLocaleString("ko-KR")}${esc(k.unit||"")} · 현재 ${Number(k.currentValue||0).toLocaleString("ko-KR")}${esc(k.unit||"")} · 연결 할 일 ${done}/${all.length}</p>
        <div class="progress ${rate>=80?'green':rate>=50?'yellow':'red'}"><span style="width:${rate}%"></span></div>
      </div>
      <button class="btn small" onclick="openModal('taskForKpi','${k.id}')">+ 이 KPI에 할 일</button>

    <div class="kpi-group-body">${all.length?all.map(taskRow).join(""):`<div class="empty">이 KPI에 연결된 할 일이 없습니다.</div>`}</div>
  </div>`;
}

      <button class="btn secondary small" onclick="openModal('deliverable','${d.id}')">수정</button>
      <button class="btn ghost small" onclick="removeItem('deliverables','${d.id}')">삭제</button>
    </div>
  </div>`;

function statusPill(s){
  if(s==="done") return `<span class="pill green">완료</span>`;
  if(s==="progress") return `<span class="pill blue">진행중</span>`;
  return `<span class="pill">예정</span>`;
}

function priorityPill(p){
  if(p==="high") return `<span class="pill red">중요</span>`;
  if(p==="medium") return `<span class="pill yellow">보통</span>`;
  return `<span class="pill">낮음</span>`;
}

function selectProject(id){ data.selectedProjectId=id; render(); }

function setView(v){
  currentView=v;
  document.querySelectorAll(".view").forEach(e=>e.classList.remove("active"));
  document.getElementById(v).classList.add("active");
  updateTabs();
}

function updateTabs(){
  document.querySelectorAll("[data-view]").forEach(b=>b.classList.toggle("active",b.dataset.view===currentView));
}

function openModal(type,id=null){
  const p=selectedProject();
  if(!p && type!=="project") return;

  let fixedKpiId = null;
  if(type === "taskForKpi"){
    fixedKpiId = id;
    type = "task";
    id = null;
  }

  const modal=document.getElementById("modalBackdrop");
  const title=document.getElementById("modalTitle");
  const desc=document.getElementById("modalDesc");
  const form=document.getElementById("modalForm");

  const item=type==="project"?data.projects.find(x=>x.id===id)
    :type==="task"?data.tasks.find(x=>x.id===id)
    :type==="budget"?data.budgets.find(x=>x.id===id)
    :type==="transaction"?data.transactions.find(x=>x.id===id)
    :type==="kpi"?data.kpis.find(x=>x.id===id)
    :data.deliverables.find(x=>x.id===id);

  const cfg=getFormConfig(type,item,fixedKpiId);
  title.textContent=(id?"수정: ":"등록: ")+cfg.title;
  desc.textContent=cfg.desc;
  form.innerHTML=cfg.html+`<div class="modal-actions"><button type="button" class="btn secondary" onclick="hideModal()">취소</button><button type="submit" class="btn">${id?"수정 완료":"등록하기"}</button></div>`;
  form.onsubmit=e=>{e.preventDefault();submitForm(type,id,new FormData(form));};
  modal.classList.add("show");
}

function getFormConfig(type,item,fixedKpiId=null){

      ${field("name","프로젝트명",item?.name||"","text",true)}
      ${field("organization","주관기관/운영기관",item?.organization||"","text",false)}
      ${field("startDate","시작일",item?.startDate||todayString(),"date",true)}
      ${field("endDate","종료일",item?.endDate||todayString(),"date",true)}
      ${field("totalBudget","총 배정 예산",item?.totalBudget||"","number",true)}
      <div class="field"><label>상태</label><select name="status">${option("active","진행중",item?.status)}${option("paused","보류",item?.status)}${option("closed","종료",item?.status)}</select></div>
      <div class="field full"><label>메모</label><textarea name="memo">${esc(item?.memo||"")}</textarea></div>
    </div>`

        <div class="field full">
          <label>넣을 KPI</label>

        </div>
        ${field("title","할 일 제목",item?.title||"","text",true)}
        ${field("category","분류",item?.category||"","text",false)}
        ${field("dueDate","마감일",item?.dueDate||todayString(),"date",true)}
        <div class="field"><label>상태</label><select name="status">${option("todo","예정",item?.status)}${option("progress","진행중",item?.status)}${option("done","완료",item?.status)}</select></div>
        <div class="field"><label>우선순위</label><select name="priority">${option("high","중요",item?.priority)}${option("medium","보통",item?.priority)}${option("low","낮음",item?.priority)}</select></div>
        <div class="field full"><label>메모</label><textarea name="memo">${esc(item?.memo||"")}</textarea></div>
      </div>`
    };
  }

  if(type==="budget") return {
    title:"예산 항목",
    desc:"인건비, 홍보비, 운영비 등 항목별 배정액입니다.",
    html:`<div class="form-grid">${field("name","예산 항목명",item?.name||"","text",true)}${field("allocatedAmount","배정 예산",item?.allocatedAmount||"","number",true)}</div>`
  };

  if(type==="transaction"){
    const budgets=data.budgets.filter(b=>b.projectId===p.id);
    return {
      title:"입출금",
      desc:"지원금 입금, 이자, 자부담, 사업비 지출, 반납을 모두 기록합니다.",
      html:`<div class="form-grid">
        <div class="field"><label>구분</label><select name="type">${option("income","입금",item?.type)}${option("expense","출금",item?.type)}</select></div>
        <div class="field"><label>입금 유형</label><select name="incomeType">${option("grant","지원금",item?.incomeType)}${option("self","자부담",item?.incomeType)}${option("interest","이자",item?.incomeType)}${option("refund","환급",item?.incomeType)}${option("other_income","기타입금",item?.incomeType)}</select></div>
        ${field("date","날짜",item?.date||todayString(),"date",true)}
        ${field("title","내용",item?.title||"","text",true)}
        <div class="field"><label>예산 항목</label><select name="budgetCategoryId"><option value="">항목 없음/입금</option>${budgets.map(b=>option(b.id,b.name,item?.budgetCategoryId)).join("")}</select></div>
        ${field("amount","금액",item?.amount||"","number",true)}
        ${field("vendor","거래처/입금처",item?.vendor||"","text",false)}
        ${field("method","결제/입금 수단",item?.method||"","text",false)}
        <div class="field"><label>증빙</label><select name="hasReceipt">${option("true","있음",String(item?.hasReceipt??true))}${option("false","없음",String(item?.hasReceipt??true))}</select></div>

    html:`<div class="form-grid">
      ${field("title","KPI명",item?.title||"","text",true)}
      ${field("targetValue","목표 수치",item?.targetValue||"","number",true)}
      ${field("currentValue","현재 수치",item?.currentValue??0,"number",true)}

      ${field("title","산출물명",item?.title||"","text",true)}

      <div class="field full"><label>메모</label><textarea name="memo">${esc(item?.memo||"")}</textarea></div>

function field(name,label,value,type,required){
  return `<div class="field"><label>${label}</label><input name="${name}" type="${type}" value="${attr(value)}" ${required?"required":""}/></div>`;
}

function option(value,label,selected){
  return `<option value="${attr(value)}" ${String(selected)===String(value)?"selected":""}>${esc(label)}</option>`;
}

function submitForm(type,id,fd){
  const p=selectedProject();
  let collection,payload;

  if(type==="project"){
    collection=data.projects;
    payload={
      name:fd.get("name").trim(),
      organization:fd.get("organization").trim(),
      startDate:fd.get("startDate"),
      endDate:fd.get("endDate"),
      totalBudget:Number(fd.get("totalBudget")||0),
      status:fd.get("status"),
      memo:fd.get("memo").trim()
    };
  }

  if(type==="task"){
    collection=data.tasks;
    const kpiId = fd.get("kpiId");
    const same=data.tasks.filter(t=>t.projectId===p.id && t.kpiId===kpiId);
    const maxOrder=Math.max(0,...same.map(t=>Number(t.order||0)));
    payload={
      projectId:p.id,
      kpiId,
      order:id ? (data.tasks.find(t=>t.id===id)?.order||maxOrder+1) : maxOrder+1,
      title:fd.get("title").trim(),
      category:fd.get("category").trim(),
      dueDate:fd.get("dueDate"),
      status:fd.get("status"),
      priority:fd.get("priority"),
      memo:fd.get("memo").trim()
    };
  }

  if(type==="budget"){
    collection=data.budgets;
    payload={projectId:p.id,name:fd.get("name").trim(),allocatedAmount:Number(fd.get("allocatedAmount")||0)};
  }

  if(type==="transaction"){
    collection=data.transactions;
    payload={
      projectId:p.id,
      type:fd.get("type"),
      incomeType:fd.get("incomeType"),
      budgetCategoryId:fd.get("budgetCategoryId"),
      date:fd.get("date"),
      title:fd.get("title").trim(),
      amount:Number(fd.get("amount")||0),
      vendor:fd.get("vendor").trim(),
      method:fd.get("method").trim(),
      hasReceipt:fd.get("hasReceipt")==="true",
      memo:fd.get("memo").trim()
    };
  }

  if(type==="kpi"){
    collection=data.kpis;
    payload={
      projectId:p.id,
      title:fd.get("title").trim(),
      targetValue:Number(fd.get("targetValue")||0),
      currentValue:Number(fd.get("currentValue")||0),
      unit:fd.get("unit").trim()
    };
  }

  if(type==="deliverable"){
    collection=data.deliverables;
    payload={projectId:p.id,title:fd.get("title").trim(),dueDate:fd.get("dueDate"),status:fd.get("status"),memo:fd.get("memo").trim()};
  }

  if(id){
    Object.assign(collection.find(x=>x.id===id),payload);
  } else {
    const m={project:"p",task:"t",budget:"b",transaction:"m",kpi:"k",deliverable:"d"};
    const newItem={id:uid(m[type]),...payload};
    collection.push(newItem);
    if(type==="project") data.selectedProjectId=newItem.id;
  }

  hideModal();
  render();
}

function normalizeTaskOrders(projectId,kpiId){
  const arr=data.tasks
    .filter(t=>t.projectId===projectId && t.kpiId===kpiId)
    .sort((a,b)=>(a.order||0)-(b.order||0));
  arr.forEach((t,i)=>t.order=i+1);
  return arr;
}

function getTaskDisplayOrder(task){
  const arr=data.tasks
    .filter(t=>t.projectId===task.projectId && t.kpiId===task.kpiId)
    .sort((a,b)=>(a.order||0)-(b.order||0));
  return arr.findIndex(t=>t.id===task.id)+1;
}

function moveTask(id,dir){
  const task=data.tasks.find(t=>t.id===id);
  if(!task) return;
  const arr=normalizeTaskOrders(task.projectId, task.kpiId);
  const idx=arr.findIndex(t=>t.id===id), next=idx+dir;
  if(next<0 || next>=arr.length) return;
  [arr[idx].order, arr[next].order] = [arr[next].order, arr[idx].order];
  normalizeTaskOrders(task.projectId, task.kpiId);
  render();
}

function changeTaskOrder(id){
  const task=data.tasks.find(t=>t.id===id);
  if(!task) return;
  const arr=normalizeTaskOrders(task.projectId, task.kpiId);
  const currentIndex=arr.findIndex(t=>t.id===id);
  const currentOrder=currentIndex+1;
  const total=arr.length;
  const input=prompt(`몇 번째로 이동할까요? 현재 ${currentOrder}번째입니다. 1~${total} 사이 숫자를 입력하세요.`, String(currentOrder));
  if(input===null) return;
  const targetOrder=Number(input);
  if(!Number.isInteger(targetOrder) || targetOrder<1 || targetOrder>total){
    alert(`1부터 ${total} 사이의 숫자만 입력하세요.`);
    return;
  }
  const [picked]=arr.splice(currentIndex,1);
  arr.splice(targetOrder-1,0,picked);
  arr.forEach((t,i)=>t.order=i+1);
  render();
}

function setTaskStatus(id,status){
  const t=data.tasks.find(x=>x.id===id);
  if(t) t.status=status;
  render();
}

function setDeliverableStatus(id,status){
  const d=data.deliverables.find(x=>x.id===id);
  if(d) d.status=status;
  render();
}

function removeItem(name,id){
  if(!confirm("삭제하시겠습니까?")) return;
  data[name]=data[name].filter(x=>x.id!==id);
  if(name==="kpis") data.tasks.forEach(t=>{ if(t.kpiId===id) t.kpiId=""; });
  render();
}

function deleteProject(id){
  if(!confirm("프로젝트와 연결 데이터를 모두 삭제할까요?")) return;
  data.projects=data.projects.filter(p=>p.id!==id);
  ["tasks","budgets","transactions","kpis","deliverables"].forEach(k=>data[k]=data[k].filter(x=>x.projectId!==id));
  data.selectedProjectId=data.projects[0]?.id||null;
  render();
}

function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="grant-board-v5-backup.json";
  a.click();
  URL.revokeObjectURL(url);
}

function closeModal(e){
  if(e.target.id==="modalBackdrop") hideModal();
}

function hideModal(){
  document.getElementById("modalBackdrop").classList.remove("show");
  document.getElementById("modalForm").innerHTML="";
}

function esc(v){
  return String(v??"")
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function attr(v){
  return esc(v).replaceAll("\n"," ");
}

render();
</script>
